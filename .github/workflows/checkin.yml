name: AnyRouter 自动签到
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 开启调试模式（截图 artifact、详细日志）
        required: false
        default: false
        type: boolean

jobs:
  checkin:
    runs-on: ubuntu-24.04
    environment: production
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: 1
      DEBUG_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug == 'true' && 'true' || 'false' }}

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        version: "latest"

    - name: 缓存 UV 依赖
      uses: actions/cache@v5
      id: uv-cache
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: 安装依赖
      run: |
        uv sync --frozen
        echo "✅ 环境初始化完成"

    - name: 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          xvfb \
          fonts-noto-color-emoji \
          fonts-freefont-ttf \
          fonts-unifont \
          fonts-ipafont-gothic \
          fonts-wqy-zenhei \
          fonts-tlwg-loma-otf \
          libatk1.0-0 \
          libatk-bridge2.0-0 \
          libcups2 \
          libdrm2 \
          libxkbcommon0 \
          libxcomposite1 \
          libxdamage1 \
          libxfixes3 \
          libxrandr2 \
          libgbm1 \
          libpango-1.0-0 \
          libcairo2 \
          libnss3 \
          libnspr4 \
          libx11-xcb1 \
          libxshmfence1 \
          libgtk-3-0 \
          libxss1 \
          libxtst6 \
          libatspi2.0-0
        sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2

    - name: 缓存 CloakBrowser 二进制
      uses: actions/cache@v5
      id: cloakbrowser-cache
      with:
        path: ~/.cloakbrowser
        key: ${{ runner.os }}-cloakbrowser-v1
        restore-keys: |
          ${{ runner.os }}-cloakbrowser-

    - name: 安装 CloakBrowser
      run: |
        uv run python -m cloakbrowser install
        echo "✅ CloakBrowser 安装完成"

    - name: 调试 CloakBrowser 二进制
      if: always()
      run: |
        CHROME="$(find "$HOME/.cloakbrowser" -name chrome -type f | head -n 1)"
        echo "CHROME=$CHROME"
        ls -lah "$CHROME" || true
        file "$CHROME" || true
        ldd "$CHROME" | grep "not found" || true
        "$CHROME" --headless=new --no-sandbox --disable-gpu --disable-dev-shm-usage --version || true
